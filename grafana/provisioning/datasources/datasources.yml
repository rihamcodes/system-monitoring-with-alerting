apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: false
    jsonData:
      maxLines: 50
      derivedFields:
        # Link trace IDs in logs to future tracing backend if added
        - name: TraceID
          matcherRegex: 'traceID=(\w+)'
          url: ''
